<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Melodify Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #16161f;
            --surface-light: #1e1e2a;
            --accent: #e94560;
            --accent2: #0f3460;
            --text: #ffffff;
            --text-secondary: #b0b0c0;
            --border: rgba(255,255,255,0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --player-height: 80px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --font: 'Inter', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(ellipse at 30% 0%, rgba(233,69,96,0.15) 0%, transparent 50%),
                              radial-gradient(ellipse at 70% 100%, rgba(15,52,96,0.2) 0%, transparent 50%);
        }

        /* LOGIN */
        .login-overlay {
            position: fixed; inset:0; background: var(--bg);
            display:flex; align-items:center; justify-content:center; z-index:200;
        }
        .login-box {
            background: var(--surface);
            border:1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            width: 90%; max-width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-box h2 { font-weight:800; font-size:1.8rem; margin-bottom:8px; }
        .login-box p { color: var(--text-secondary); margin-bottom:24px; }
        .login-box input {
            width:100%; padding:14px 18px; border-radius: 50px;
            background: var(--surface-light); border:1px solid var(--border);
            color:white; margin-bottom:12px; font-family: var(--font);
            outline:none;
        }
        .login-box input:focus { border-color: var(--accent); }
        .btn-login {
            width:100%; padding:14px; border-radius:50px;
            background: var(--accent); color:white; border:none;
            font-weight:700; cursor:pointer; margin-top:8px;
            font-family: var(--font);
        }
        .login-error { color: #ff5555; margin-top:12px; display:none; }

        /* MAIN APP */
        .app-container { display:flex; flex:1; overflow:hidden; }
        .sidebar {
            width:260px; min-width:260px;
            background: var(--surface); border-right:1px solid var(--border);
            display:flex; flex-direction:column; z-index:20;
            transition: transform 0.3s;
        }
        @media (max-width:768px) {
            .sidebar { position:fixed; left:0; top:0; bottom:0; transform: translateX(-100%); width:280px; }
            .sidebar.open { transform: translateX(0); }
        }
        .sidebar-logo { padding:24px 20px; display:flex; align-items:center; gap:10px; }
        .sidebar-logo .logo-icon { width:36px; height:36px; background: var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:20px; }
        .sidebar-nav { flex:1; overflow-y:auto; padding:8px 12px; }
        .nav-item, .playlist-item {
            display:flex; align-items:center; gap:10px; padding:10px 14px;
            border-radius: var(--radius-sm); cursor:pointer; color: var(--text-secondary);
            font-size:0.9rem; margin-bottom:2px;
        }
        .nav-item.active, .playlist-item.active-playlist { background: var(--accent2); color:white; }
        .sidebar-section-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-secondary); padding:16px 14px 6px; }
        .btn-create-playlist { margin:6px 14px; padding:8px; border-radius:8px; background:rgba(255,255,255,0.05); border:1px dashed var(--border); color:var(--text-secondary); cursor:pointer; font-weight:600; }

        .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .main-header {
            padding:16px 20px; background: var(--surface);
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:12px;
        }
        .main-header h2 { flex:1; font-weight:700; }
        .search-bar {
            display:flex; align-items:center; gap:8px;
            background: var(--surface-light); border-radius:50px;
            padding:8px 16px; border:1px solid var(--border);
        }
        .search-bar input { background:none; border:none; color:white; width:120px; outline:none; font-family: var(--font); }
        .menu-btn { background:none; border:none; font-size:1.5rem; color:white; cursor:pointer; display:none; }
        @media (max-width:768px) { .menu-btn { display:block; } }
        .admin-btn {
            padding:8px 16px; border-radius:50px; background: var(--accent);
            color:white; border:none; font-weight:600; cursor:pointer;
            margin-left:8px; font-family: var(--font);
        }
        .content-area { flex:1; overflow-y:auto; padding:16px 20px 100px; display:flex; flex-direction:column; gap:6px; }

        .song-row {
            display:flex; align-items:center; gap:12px; padding:12px 14px;
            border-radius: var(--radius-sm); background: var(--surface-light);
            cursor:pointer; transition:0.2s;
        }
        .song-row:hover { background: #262638; }
        .song-row.playing { background: var(--accent2); }
        .song-index { width:32px; height:32px; border-radius:6px; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-weight:700; }
        .album-art { width:44px; height:44px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:1rem; }
        .song-info { flex:1; min-width:0; }
        .song-title { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .song-artist { font-size:0.8rem; color: var(--text-secondary); }
        .song-actions { display:flex; gap:4px; opacity:0; transition:0.2s; }
        .song-row:hover .song-actions { opacity:1; }
        .song-actions button {
            width:30px; height:30px; border-radius:50%; border:none;
            background:rgba(255,255,255,0.15); color:white; cursor:pointer;
        }

        .fab {
            position:fixed; bottom:100px; right:20px; width:56px; height:56px;
            border-radius:50%; background: var(--accent); color:white; border:none;
            font-size:1.8rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
            z-index:30; box-shadow: 0 8px 20px rgba(233,69,96,0.5);
        }
        .player-bar {
            position:fixed; bottom:0; left:0; right:0;
            background: var(--surface); border-top:1px solid var(--border);
            padding:8px 16px; padding-bottom:calc(8px + var(--safe-bottom));
            display:flex; flex-direction:column; gap:6px; z-index:50;
        }
        .progress-container { display:flex; align-items:center; gap:8px; width:100%; }
        .progress-bar { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:10px; cursor:pointer; }
        .progress-fill { height:100%; background:var(--accent); border-radius:10px; width:0%; }
        .player-main { display:flex; align-items:center; gap:12px; }
        .player-controls { display:flex; gap:10px; }
        .player-controls button { background:none; border:none; color:white; font-size:1.2rem; cursor:pointer; }
        .btn-play-main { width:40px; height:40px; background:var(--accent); border-radius:50%; border:none; }

        /* MODAL */
        .modal {
            position:fixed; inset:0; background:rgba(0,0,0,0.7);
            display:flex; align-items:center; justify-content:center; z-index:100;
        }
        .modal-content {
            background: var(--surface); border:1px solid var(--border);
            border-radius:16px; padding:24px; width:90%; max-width:400px;
            color:white;
        }
        .close-btn { position:absolute; top:12px; right:12px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer; }

        .toast {
            position:fixed; top:20px; right:20px; background:var(--accent);
            color:white; padding:10px 20px; border-radius:50px; z-index:300;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🎵 Melodify</h2>
        <p>Sign in to continue</p>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button class="btn-login" id="btnSignIn">Sign In</button>
        <div class="login-error" id="loginError">Invalid credentials</div>
    </div>
</div>

<!-- APP (hidden initially) -->
<div class="app-container" id="appContainer" style="display:none;">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><div class="logo-icon">🎵</div><span>Melodify</span></div>
        <nav class="sidebar-nav">
            <div class="nav-item active" data-view="library">📚 Library</div>
            <div class="nav-item" data-view="queue">⏳ Queue</div>
            <div class="nav-item" data-view="movies">🎬 Movies</div>
            <div class="sidebar-section-title">Playlists</div>
            <div id="playlistContainer"></div>
            <button class="btn-create-playlist" id="btnNewPlaylist">+ New Playlist</button>
        </nav>
    </aside>
    <main class="main-content">
        <div class="main-header">
            <button class="menu-btn" id="menuToggle">☰</button>
            <h2 id="viewTitle">Library</h2>
            <div class="search-bar"><span>🔍</span><input type="text" id="searchInput" placeholder="Search..."></div>
            <button class="admin-btn" id="btnManageUsers" style="display:none;">Manage Users</button>
            <button class="admin-btn" id="desktopAddBtn" style="display:none;">+ Add Song</button>
        </div>
        <div class="content-area" id="contentArea"></div>
    </main>
    <button class="fab" id="fabAdd" style="display:none;">＋</button>
</div>

<!-- PLAYER BAR -->
<div class="player-bar" id="playerBar" style="display:none;">
    <div class="progress-container">
        <span id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="totalTime">0:00</span>
    </div>
    <div class="player-main">
        <div class="album-art" id="npArt" style="background:var(--accent);">🎶</div>
        <div style="flex:1;">
            <div id="npTitle" style="font-weight:600;">No song</div>
            <div id="npArtist" style="font-size:0.8rem;color:var(--text-secondary);"></div>
        </div>
        <div class="player-controls">
            <button id="btnShuffle">🔀</button>
            <button id="btnPrev">⏮️</button>
            <button class="btn-play-main" id="btnPlay">▶️</button>
            <button id="btnNext">⏭️</button>
            <button id="btnRepeat">🔁</button>
        </div>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7" style="width:80px;">
    </div>
</div>

<!-- ADD SONG MODAL -->
<div id="addSongModal" class="modal" style="display:none;">
    <div class="modal-content" style="position:relative;">
        <button class="close-btn" id="closeAddSong">&times;</button>
        <h3>Add Song</h3>
        <input type="text" id="inpName" placeholder="Song name" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; background:var(--surface-light); border:1px solid var(--border); color:white;">
        <input type="text" id="inpArtist" placeholder="Artist" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; background:var(--surface-light); border:1px solid var(--border); color:white;">
        <input type="text" id="inpMovie" placeholder="Movie/Album" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; background:var(--surface-light); border:1px solid var(--border); color:white;">
        <input type="text" id="inpUrl" placeholder="Audio URL (songs/file.mp3)" style="width:100%; margin-bottom:16px; padding:10px; border-radius:8px; background:var(--surface-light); border:1px solid var(--border); color:white;">
        <button id="saveSongBtn" style="background:var(--accent); border:none; color:white; padding:10px 24px; border-radius:50px; font-weight:600; cursor:pointer;">Save</button>
    </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
(async () => {
    const API_URL = 'https://script.google.com/macros/s/AKfycbyqHxvywPa7z0ZsJOVVxtfPLj-AHskLFHKzfWtc5lmh3VEz3SVESmul4bDC9Htzp950/exec'; // ← PASTE YOUR DEPLOYMENT URL

    // STATE
    let songs = [], playlists = [], queue = [];
    let currentSongId = null, isPlaying = false;
    let shuffle = false, repeat = 'none';
    let currentView = 'library', currentMovie = null, currentPlaylistId = null;
    let isAdmin = false;

    // DOM refs
    const loginOverlay = document.getElementById('loginOverlay');
    const appContainer = document.getElementById('appContainer');
    const playerBar = document.getElementById('playerBar');
    const fabAdd = document.getElementById('fabAdd');
    const desktopAddBtn = document.getElementById('desktopAddBtn');
    const btnManageUsers = document.getElementById('btnManageUsers');
    const contentArea = document.getElementById('contentArea');
    const audio = document.getElementById('audio');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const btnPlay = document.getElementById('btnPlay');
    const npTitle = document.getElementById('npTitle');
    const npArtist = document.getElementById('npArtist');
    const npArt = document.getElementById('npArt');
    const searchInput = document.getElementById('searchInput');

    // LOGIN
    document.getElementById('btnSignIn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const res = await fetch(API_URL + '?action=authenticate', {
            method: 'POST',
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (data.success) {
            isAdmin = data.isAdmin;
            sessionStorage.setItem('melodify_auth', JSON.stringify({email, isAdmin}));
            loginOverlay.style.display = 'none';
            appContainer.style.display = 'flex';
            playerBar.style.display = 'flex';
            if (isAdmin) {
                fabAdd.style.display = 'flex';
                desktopAddBtn.style.display = 'inline-block';
                btnManageUsers.style.display = 'inline-block';
            }
            await loadAllData();
            updateUI();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    });

    // Auto-login if session exists
    const savedAuth = JSON.parse(sessionStorage.getItem('melodify_auth'));
    if (savedAuth) {
        isAdmin = savedAuth.isAdmin;
        loginOverlay.style.display = 'none';
        appContainer.style.display = 'flex';
        playerBar.style.display = 'flex';
        if (isAdmin) {
            fabAdd.style.display = 'flex';
            desktopAddBtn.style.display = 'inline-block';
            btnManageUsers.style.display = 'inline-block';
        }
        await loadAllData();
        updateUI();
    }

    // API helpers
    async function fetchAPI(action, data = null) {
        const params = new URLSearchParams({ action });
        const opts = data ? { method:'POST', body: JSON.stringify(data) } : {};
        const res = await fetch(API_URL + '?' + params, opts);
        return res.json();
    }

    async function loadAllData() {
        const [songsData, playlistsData, queueData] = await Promise.all([
            fetchAPI('listSongs'), fetchAPI('listPlaylists'), fetchAPI('getQueue')
        ]);
        songs = songsData; playlists = playlistsData; queue = queueData;
    }

    // Player functions
    function playSong(id) {
        const song = songs.find(s => s.id === id);
        if (!song) return;
        audio.src = song.url;
        audio.play().catch(() => showToast('Cannot play file'));
        currentSongId = id;
        isPlaying = true;
        updateUI();
    }
    function togglePlay() {
        if (!currentSongId) { const ctx = getContextSongs(); if(ctx.length) playSong(ctx[0].id); return; }
        if (isPlaying) { audio.pause(); isPlaying = false; }
        else { audio.play(); isPlaying = true; }
        updateUI();
    }
    async function nextTrack() {
        if (queue.length) {
            const nextId = queue.shift();
            await fetchAPI('updateQueue', queue);
            playSong(nextId);
            return;
        }
        if (repeat === 'one' && currentSongId) { audio.currentTime = 0; audio.play(); return; }
        const ctx = getContextSongs();
        if (!ctx.length) return;
        let idx = ctx.findIndex(s => s.id === currentSongId);
        if (shuffle) idx = Math.floor(Math.random() * ctx.length);
        else idx = (idx + 1) % ctx.length;
        if (ctx[idx]) playSong(ctx[idx].id);
    }
    function getContextSongs() {
        if (currentView === 'playlist' && currentPlaylistId) {
            const pl = playlists.find(p => p.id === currentPlaylistId);
            return pl ? pl.songIds.map(id => songs.find(s => s.id === id)).filter(Boolean) : [];
        }
        if (currentView === 'movie' && currentMovie) return songs.filter(s => s.movie === currentMovie);
        return [...songs];
    }

    // UI rendering
    function render() {
        if (currentView === 'movies') {
            const movies = [...new Set(songs.map(s => s.movie).filter(m => m))];
            contentArea.innerHTML = movies.map(m => `<div class="song-row" data-movie="${esc(m)}" style="justify-content:center;">🎬 ${esc(m)} (${songs.filter(s=>s.movie===m).length})</div>`).join('');
            return;
        }
        let list = getContextSongs();
        if (currentView === 'queue') list = queue.map(id => songs.find(s => s.id === id)).filter(Boolean);
        const q = searchInput.value.toLowerCase();
        if (q) list = list.filter(s => s.name.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));

        contentArea.innerHTML = list.map((s,i) => `
            <div class="song-row ${currentSongId===s.id && isPlaying ? 'playing' : ''}" data-id="${s.id}">
                <div class="song-index">${i+1}</div>
                <div class="album-art" style="background:${stringToColor(s.name)};">${s.name[0]}</div>
                <div class="song-info">
                    <div class="song-title">${esc(s.name)}</div>
                    <div class="song-artist">${esc(s.artist)}${s.movie ? ' · '+esc(s.movie) : ''}</div>
                </div>
                <div class="song-actions">
                    <button data-action="play">▶️</button>
                    <button data-action="queue">➕</button>
                    ${isAdmin ? '<button data-action="delete">🗑️</button>' : ''}
                </div>
            </div>`).join('') || '<div style="text-align:center;padding:40px;">No songs</div>';
        updateNowPlaying();
    }

    function updateNowPlaying() {
        btnPlay.textContent = isPlaying ? '⏸️' : '▶️';
        const song = songs.find(s => s.id === currentSongId);
        npTitle.textContent = song ? song.name : 'No song';
        npArtist.textContent = song ? (song.artist + (song.movie ? ' · '+song.movie : '')) : '';
        npArt.style.background = song ? stringToColor(song.name) : 'var(--accent)';
        npArt.textContent = song ? song.name[0] : '🎶';
        document.getElementById('volumeSlider').value = audio.volume;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function stringToColor(s) { const colors = ['#e94560','#0f3460','#533483','#16213e']; let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h); return colors[Math.abs(h)%colors.length]; }

    // Event delegation
    contentArea.addEventListener('click', async e => {
        const row = e.target.closest('.song-row');
        if (row && row.dataset.movie) {
            currentView = 'movie';
            currentMovie = row.dataset.movie;
            updateUI(); return;
        }
        const btn = e.target.closest('button');
        if (!btn && row) { playSong(row.dataset.id); return; }
        if (!btn) return;
        const songId = row.dataset.id;
        const action = btn.dataset.action;
        if (action === 'play') playSong(songId);
        else if (action === 'queue') {
            if (!queue.includes(songId)) queue.push(songId);
            else queue = queue.filter(id => id !== songId);
            await fetchAPI('updateQueue', queue);
            updateUI();
        }
        else if (action === 'delete' && isAdmin) {
            await fetchAPI('deleteSong', {id: songId});
            songs = songs.filter(s => s.id !== songId);
            updateUI();
        }
    });

    // Sidebar & modals
    document.getElementById('fabAdd').addEventListener('click', () => document.getElementById('addSongModal').style.display='flex');
    desktopAddBtn.addEventListener('click', () => document.getElementById('addSongModal').style.display='flex');
    document.getElementById('closeAddSong').addEventListener('click', () => document.getElementById('addSongModal').style.display='none');
    document.getElementById('saveSongBtn').addEventListener('click', async () => {
        const name = document.getElementById('inpName').value.trim();
        const artist = document.getElementById('inpArtist').value.trim();
        const movie = document.getElementById('inpMovie').value.trim();
        const url = document.getElementById('inpUrl').value.trim();
        if (!name || !artist || !url) return showToast('Fill required fields');
        const newSong = { id: 's'+Date.now(), name, artist, movie, url };
        await fetchAPI('addSong', newSong);
        songs.push(newSong);
        document.getElementById('addSongModal').style.display='none';
        updateUI();
    });

    btnManageUsers.addEventListener('click', async () => {
        const users = await fetchAPI('listUsers');
        let html = '<h3>Manage Users</h3>';
        users.forEach(u => html += `<div>${u.email} ${u.isAdmin ? '(Admin)' : ''} <button data-email="${u.email}" class="delete-user">Remove</button></div>`);
        html += '<input id="newUserEmail" placeholder="Email"><input id="newUserPass" placeholder="Password"><button id="addUserBtn">Add User</button>';
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content">${html}<button class="close-btn" id="closeUserModal">&times;</button></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#closeUserModal').addEventListener('click', () => modal.remove());
        modal.querySelector('#addUserBtn').addEventListener('click', async () => {
            const email = modal.querySelector('#newUserEmail').value;
            const pass = modal.querySelector('#newUserPass').value;
            await fetchAPI('addUser', {email, password: pass, isAdmin: false});
            modal.remove();
            showToast('User added');
        });
        modal.querySelectorAll('.delete-user').forEach(b => b.addEventListener('click', async () => {
            await fetchAPI('deleteUser', {email: b.dataset.email});
            modal.remove();
            showToast('User removed');
        }));
    });

    // Player controls
    document.getElementById('btnPlay').addEventListener('click', togglePlay);
    document.getElementById('btnNext').addEventListener('click', nextTrack);
    document.getElementById('btnPrev').addEventListener('click', () => {
        const ctx = getContextSongs();
        const idx = ctx.findIndex(s => s.id === currentSongId);
        if (idx > 0) playSong(ctx[idx-1].id);
    });
    document.getElementById('btnShuffle').addEventListener('click', () => shuffle=!shuffle);
    document.getElementById('btnRepeat').addEventListener('click', () => repeat = repeat==='none'?'all': repeat==='all'?'one':'none');
    document.getElementById('volumeSlider').addEventListener('input', e => audio.volume = e.target.value);
    audio.addEventListener('timeupdate', () => {
        if (audio.duration) progressFill.style.width = (audio.currentTime/audio.duration*100)+'%';
    });
    audio.addEventListener('ended', nextTrack);

    function updateUI() { render(); }

    function showToast(msg) {
        const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
        document.body.appendChild(t); setTimeout(()=>t.remove(),2000);
    }
})();
</script>
</body>
</html>
