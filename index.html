<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎵 Melodify — Glass Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d1a;
            --surface: rgba(255,255,255,0.06);
            --surface-hover: rgba(255,255,255,0.12);
            --glass: rgba(20,20,40,0.45);
            --accent: #ff6b6b;
            --accent2: #48dbfb;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.45);
            --border: rgba(255,255,255,0.1);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Inter', sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --player-height: 72px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(255,107,107,0.15) 0%, transparent 50%),
                              radial-gradient(ellipse at 80% 20%, rgba(72,219,251,0.12) 0%, transparent 50%);
        }

        /* LOGIN OVERLAY (glass) */
        .login-overlay {
            position: fixed; inset:0;
            background: rgba(10,10,20,0.7);
            backdrop-filter: blur(12px);
            display:flex; align-items:center; justify-content:center;
            z-index:200;
        }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 24px;
            width: 90%; max-width: 360px;
            box-shadow: var(--shadow);
            text-align: center;
            color: var(--text-primary);
        }
        .login-card .icon { font-size:3rem; margin-bottom:12px; }
        .login-card h2 { font-weight:800; font-size:1.8rem; margin-bottom:4px; }
        .login-card p { color: var(--text-secondary); margin-bottom:24px; font-size:0.9rem; }
        .login-card input {
            width:100%; padding:14px 18px; border-radius:50px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.08);
            color: white; font-size:0.95rem; margin-bottom:12px;
            font-family: var(--font); outline:none;
            transition: 0.2s;
        }
        .login-card input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,107,107,0.3);
        }
        .btn-login {
            width:100%; padding:14px; border-radius:50px;
            border:none; font-weight:700; font-size:1rem; cursor:pointer;
            font-family: var(--font); margin-bottom:12px;
            background: var(--accent); color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,107,107,0.4); }
        .btn-continue {
            background: transparent;
            border: 2px solid var(--accent2);
            color: var(--accent2);
            font-weight:600;
            margin-top:8px;
        }
        .btn-continue:hover { background: rgba(72,219,251,0.15); }
        .login-error { color: #ff6b6b; font-size:0.8rem; margin-top:8px; display:none; }

        /* MAIN APP */
        .app-container { display:flex; flex:1; overflow:hidden; }

        /* SIDEBAR (glass) */
        .sidebar {
            width:260px; min-width:260px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display:flex; flex-direction:column; height:100%;
            z-index:20; transition: transform 0.3s;
        }
        @media (max-width:768px) {
            .sidebar { position:fixed; left:0; top:0; bottom:0; transform: translateX(-100%); width:280px; }
            .sidebar.open { transform: translateX(0); }
        }
        .sidebar-logo { padding:24px 20px 16px; display:flex; align-items:center; gap:10px; }
        .sidebar-logo .logo-icon { width:40px; height:40px; background: var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
        .sidebar-logo h1 { font-weight:800; color: white; }
        .sidebar-nav { flex:1; overflow-y:auto; padding:8px 12px; }
        .nav-item, .playlist-item {
            display:flex; align-items:center; gap:10px; padding:11px 14px;
            border-radius: var(--radius-sm); cursor:pointer; color: var(--text-secondary);
            font-size:0.9rem; transition: 0.2s; margin-bottom:2px;
        }
        .nav-item:hover, .nav-item.active,
        .playlist-item:hover, .playlist-item.active-playlist {
            background: var(--surface-hover);
            color: white;
        }
        .sidebar-section-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color: var(--text-muted); padding:16px 14px 6px; }
        .btn-create-playlist {
            margin:6px 14px; padding:10px; border-radius:10px;
            background: rgba(255,255,255,0.05); border: 2px dashed var(--border);
            color: var(--text-secondary); cursor:pointer; font-weight:600;
            transition: 0.2s;
        }
        .btn-create-playlist:hover { background: rgba(255,255,255,0.1); color:white; }

        .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .main-header {
            padding:16px 20px; background: var(--glass);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            display:flex; align-items:center; gap:12px; flex-wrap:wrap;
        }
        .main-header h2 { flex:1; font-weight:700; font-size:1.3rem; color: white; }
        .search-bar {
            display:flex; align-items:center; gap:8px;
            background: var(--surface); border:1px solid var(--border);
            border-radius:50px; padding:8px 16px;
        }
        .search-bar input { border:none; background:transparent; outline:none; color:white; width:120px; font-family: var(--font); }
        .search-bar input::placeholder { color: var(--text-muted); }
        .menu-btn { background:none; border:none; font-size:1.5rem; color:white; cursor:pointer; display:none; }
        @media (max-width:768px) { .menu-btn { display:block; } }
        .content-area { flex:1; overflow-y:auto; padding:16px 20px 120px; display:flex; flex-direction:column; gap:8px; }

        .song-row {
            display:flex; align-items:center; gap:12px; padding:10px 14px;
            border-radius: var(--radius-sm); background: var(--surface);
            backdrop-filter: blur(10px); border:1px solid transparent;
            transition: 0.2s; cursor:pointer;
        }
        .song-row:hover { background: var(--surface-hover); border-color: var(--accent2); }
        .song-row.playing {
            border-color: var(--accent);
            background: rgba(255,107,107,0.2);
        }
        .song-index { width:32px; height:32px; border-radius:8px; background: rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-weight:700; color: white; }
        .album-art { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.9rem; }
        .song-info { flex:1; min-width:0; }
        .song-title { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .song-artist { font-size:0.78rem; color: var(--text-secondary); }
        .song-actions { display:flex; gap:4px; opacity:0; transition:0.2s; }
        .song-row:hover .song-actions { opacity:1; }
        .song-actions button {
            width:30px; height:30px; border-radius:50%; border:none;
            background: rgba(255,255,255,0.15); color:white;
            cursor:pointer; font-size:0.85rem;
        }
        .song-actions button:hover { background: var(--accent); }

        .fab {
            position:fixed; bottom:100px; right:20px; width:56px; height:56px;
            border-radius:50%; background: var(--accent); color:white; border:none;
            box-shadow: 0 8px 20px rgba(255,107,107,0.4); font-size:1.8rem;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            z-index:30; transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.9); }
        .desktop-add-btn {
            padding:10px 20px; border-radius:50px; background: var(--accent);
            color:white; border:none; font-weight:600; cursor:pointer;
            transition: 0.2s;
        }
        .desktop-add-btn:hover { background: #ff5252; }

        /* PLAYER BAR (glass) */
        .player-bar {
            position:fixed; bottom:0; left:0; right:0;
            background: var(--glass); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding:8px 16px; padding-bottom:calc(8px + var(--safe-bottom));
            display:flex; flex-direction:column; gap:6px; z-index:50;
        }
        .player-main { display:flex; align-items:center; gap:12px; }
        .progress-container { display:flex; align-items:center; gap:8px; width:100%; }
        .progress-bar {
            flex:1; height:5px; background: rgba(255,255,255,0.15);
            border-radius:10px; position:relative; cursor:pointer;
        }
        .progress-fill { height:100%; background: var(--accent); border-radius:10px; width:0%; }
        .time { font-size:0.7rem; color: var(--text-muted); width:36px; text-align:center; }
        .player-controls { display:flex; align-items:center; gap:10px; }
        .player-controls button { background:none; border:none; font-size:1.2rem; color:white; cursor:pointer; }
        .btn-play-main {
            width:40px; height:40px; border-radius:50%; background: var(--accent);
            color:white; font-size:1.3rem; border:none; cursor:pointer;
        }

        .bottom-sheet-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100;
            display:flex; align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none; transition:0.3s;
        }
        .bottom-sheet-overlay.active { opacity:1; pointer-events:auto; }
        .bottom-sheet {
            background: rgba(20,20,40,0.95); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius:24px 24px 0 0;
            padding:20px 24px 30px; width:100%; max-width:500px;
            transform:translateY(100%); transition:transform 0.35s ease;
            color: white;
        }
        .bottom-sheet-overlay.active .bottom-sheet { transform:translateY(0); }
        .input-with-icon {
            display:flex; align-items:center; background: var(--surface);
            border:1px solid var(--border); border-radius:12px;
            padding:0 14px; margin-bottom:12px;
        }
        .input-with-icon input {
            border:none; background:transparent; padding:13px 0;
            flex:1; outline:none; color:white; font-family: var(--font);
        }
        .btn-save {
            padding:12px 24px; border-radius:50px; background: var(--accent);
            color:white; border:none; font-weight:700; cursor:pointer;
        }

        .toast {
            position:fixed; top:20px; right:20px; background: var(--accent);
            color:white; padding:10px 20px; border-radius:50px;
            z-index:300; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap:12px; }
        .movie-card {
            background: var(--surface); backdrop-filter: blur(10px);
            border:1px solid var(--border); border-radius: var(--radius-sm);
            padding:20px; cursor:pointer; text-align:center;
            transition: 0.2s;
        }
        .movie-card:hover { background: var(--surface-hover); transform: translateY(-2px); }
        .movie-icon { font-size:2rem; margin-bottom:8px; }
        .movie-name { font-weight:600; color: white; }
        .movie-count { font-size:0.75rem; color: var(--text-muted); }
    </style>
</head>
<body>

<!-- LOGIN OVERLAY (new design) -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <div class="icon">🎵</div>
        <h2>Melodify</h2>
        <p>Your personal cloud music player</p>
        <input type="email" id="adminEmail" placeholder="Admin email">
        <input type="password" id="adminPassword" placeholder="Password">
        <button class="btn-login" id="btnAdminSubmit">Login</button>
        <button class="btn-login btn-continue" id="btnContinueWithoutLogin">Continue without login</button>
        <div class="login-error" id="loginError">Wrong credentials!</div>
    </div>
</div>

<!-- APP (hidden initially) -->
<div class="app-container" id="appContainer" style="display:none;">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><div class="logo-icon">🎵</div><h1>Melodify</h1></div>
        <nav class="sidebar-nav">
            <div class="nav-item active" data-view="library">📚 Library</div>
            <div class="nav-item" data-view="queue">⏳ Queue <span id="queueBadge" style="margin-left:auto;"></span></div>
            <div class="nav-item" data-view="movies">🎬 Movies</div>
            <div class="sidebar-section-title">🎧 Playlists</div>
            <div id="playlistContainer"></div>
            <button class="btn-create-playlist" id="btnNewPlaylist">+ New Playlist</button>
        </nav>
    </aside>
    <main class="main-content">
        <div class="main-header">
            <button class="menu-btn" id="menuToggle">☰</button>
            <h2 id="viewTitle">📚 Library</h2>
            <div class="search-bar"><span>🔍</span><input type="text" id="searchInput" placeholder="Filter..."></div>
            <button class="desktop-add-btn" id="desktopAddBtn" style="display:none;"><span>＋</span> Add Song</button>
        </div>
        <div class="content-area" id="contentArea"></div>
    </main>
    <button class="fab" id="fabAdd" style="display:none;">＋</button>
</div>

<!-- PLAYER BAR -->
<div class="player-bar" id="playerBar" style="display:none;">
    <div class="progress-container">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time" id="totalTime">0:00</span>
    </div>
    <div class="player-main">
        <div class="album-art" id="npArt" style="width:44px;height:44px;background:var(--accent);">🎶</div>
        <div style="flex:1; min-width:0;">
            <div id="npTitle" style="font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">No song</div>
            <div id="npArtist" style="font-size:0.7rem; color:var(--text-muted);"></div>
        </div>
        <div class="player-controls">
            <button id="btnShuffle">🔀</button>
            <button id="btnPrev">⏮️</button>
            <button class="btn-play-main" id="btnPlay">▶️</button>
            <button id="btnNext">⏭️</button>
            <button id="btnRepeat">🔁</button>
        </div>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7" style="width:70px; accent-color:var(--accent);">
    </div>
</div>

<!-- ADD SONG SHEET -->
<div class="bottom-sheet-overlay" id="addSongSheet">
    <div class="bottom-sheet">
        <div style="width:40px; height:4px; background:rgba(255,255,255,0.2); border-radius:10px; margin:0 auto 16px;"></div>
        <h3>🎵 Add Song</h3>
        <div class="input-with-icon"><span>🎤</span><input type="text" id="inpName" placeholder="Song name"></div>
        <div class="input-with-icon"><span>🎙️</span><input type="text" id="inpArtist" placeholder="Artist"></div>
        <div class="input-with-icon"><span>🎬</span><input type="text" id="inpMovie" placeholder="Movie/Album"></div>
        <div class="input-with-icon"><span>🔗</span><input type="text" id="inpUrl" placeholder="songs/filename.mp3"></div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button id="cancelSheetBtn" style="background:none; border:none; color:white;">Cancel</button>
            <button class="btn-save" id="saveSongBtn">Save Song</button>
        </div>
    </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
(async () => {
    // ========== CONFIGURATION ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbyqHxvywPa7z0ZsJOVVxtfPLj-AHskLFHKzfWtc5lmh3VEz3SVESmul4bDC9Htzp950/exec'; // ← PASTE YOUR GOOGLE APPS SCRIPT URL

    // ========== LOGIN ==========
    const ADMIN_EMAIL = "yalamanchilijoshi135@gmail.com";
    const ADMIN_PASSWORD = "123musicmadeeasy@!@#123";
    let isAdmin = false;

    // Check if already logged in via session
    if (sessionStorage.getItem('melodify_logged_in') === 'true') {
        isAdmin = sessionStorage.getItem('melodify_is_admin') === 'true';
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        document.getElementById('playerBar').style.display = 'flex';
        if (isAdmin) {
            document.getElementById('fabAdd').style.display = 'flex';
            document.getElementById('desktopAddBtn').style.display = 'flex';
        }
        await loadAllData();
        updateUI();
    }

    // Login attempt
    document.getElementById('btnAdminSubmit').addEventListener('click', async () => {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            isAdmin = true;
            sessionStorage.setItem('melodify_logged_in', 'true');
            sessionStorage.setItem('melodify_is_admin', 'true');
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            document.getElementById('playerBar').style.display = 'flex';
            document.getElementById('fabAdd').style.display = 'flex';
            document.getElementById('desktopAddBtn').style.display = 'flex';
            await loadAllData();
            updateUI();
        } else {
            document.getElementById('loginError').style.display = 'block';
            setTimeout(() => document.getElementById('loginError').style.display = 'none', 2000);
        }
    });

    // Continue without login (user mode)
    document.getElementById('btnContinueWithoutLogin').addEventListener('click', async () => {
        isAdmin = false;
        sessionStorage.setItem('melodify_logged_in', 'true');
        sessionStorage.setItem('melodify_is_admin', 'false');
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        document.getElementById('playerBar').style.display = 'flex';
        document.getElementById('fabAdd').style.display = 'none';
        document.getElementById('desktopAddBtn').style.display = 'none';
        await loadAllData();
        updateUI();
    });

    // ========== DATA STORE ==========
    let songs = [];
    let playlists = [];
    let queue = [];
    let currentSongId = null;
    let isPlaying = false;
    let shuffle = false;
    let repeat = 'none';
    let currentView = 'library';
    let currentMovie = null;
    let currentPlaylistId = null;

    async function fetchAPI(action, data = null) {
        const params = new URLSearchParams({ action });
        const url = API_URL + '?' + params.toString();
        const options = {};
        if (data) {
            options.method = 'POST';
            options.body = JSON.stringify(data);
        }
        const res = await fetch(url, options);
        return res.json();
    }

    async function loadAllData() {
        try {
            const [songsData, playlistsData, queueData] = await Promise.all([
                fetchAPI('listSongs'),
                fetchAPI('listPlaylists'),
                fetchAPI('getQueue')
            ]);
            songs = songsData || [];
            playlists = playlistsData || [];
            queue = queueData || [];
            const savedId = sessionStorage.getItem('melodify_currentSongId');
            if (savedId && songs.find(s => s.id === savedId)) {
                currentSongId = savedId;
            }
        } catch (e) {
            showToast('Failed to load data. Check API URL.');
            console.error(e);
        }
    }

    // ========== AUDIO PLAYER ==========
    const audio = document.getElementById('audio');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');

    function formatTime(sec) {
        if (isNaN(sec)) return '0:00';
        const m = Math.floor(sec/60);
        const s = Math.floor(sec%60);
        return `${m}:${s<10?'0':''}${s}`;
    }

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        }
    });
    audio.addEventListener('loadedmetadata', () => {
        totalTimeEl.textContent = formatTime(audio.duration);
    });
    audio.addEventListener('ended', nextTrack);

    // Seek
    progressBar.addEventListener('click', (e) => {
        if (!audio.duration) return;
        const rect = progressBar.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        audio.currentTime = ratio * audio.duration;
    });
    let isDragging = false;
    progressBar.addEventListener('mousedown', (e) => { isDragging=true; seek(e); });
    document.addEventListener('mousemove', (e) => { if(isDragging) seek(e); });
    document.addEventListener('mouseup', () => { isDragging=false; });
    progressBar.addEventListener('touchstart', (e) => { isDragging=true; seek(e.touches[0]); });
    progressBar.addEventListener('touchmove', (e) => { if(isDragging) seek(e.touches[0]); });
    progressBar.addEventListener('touchend', () => { isDragging=false; });
    function seek(e) {
        const rect = progressBar.getBoundingClientRect();
        const ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
        audio.currentTime = ratio * audio.duration;
    }

    function playSong(id) {
        const song = songs.find(s=>s.id===id);
        if (!song) return;
        audio.src = song.url;
        audio.play().catch(() => showToast('Cannot play: '+song.url));
        currentSongId = id;
        sessionStorage.setItem('melodify_currentSongId', id);
        isPlaying = true;
        updateUI();
    }
    function togglePlay() {
        if (!currentSongId) {
            const ctx = getContextSongs();
            if (ctx.length) playSong(ctx[0].id);
            return;
        }
        if (isPlaying) { audio.pause(); isPlaying=false; }
        else { audio.play(); isPlaying=true; }
        updateUI();
    }
    async function nextTrack() {
        if (queue.length) {
            const nextId = queue.shift();
            await fetchAPI('updateQueue', queue);
            playSong(nextId);
            return;
        }
        if (repeat==='one' && currentSongId) { audio.currentTime=0; audio.play(); return; }
        const ctx = getContextSongs();
        if (!ctx.length) return;
        let idx = ctx.findIndex(s=>s.id===currentSongId);
        if (shuffle) idx = Math.floor(Math.random()*ctx.length);
        else idx = (idx+1) % ctx.length;
        if (ctx[idx]) playSong(ctx[idx].id);
    }

    function getContextSongs() {
        if (currentView==='playlist' && currentPlaylistId) {
            const pl = playlists.find(p=>p.id===currentPlaylistId);
            return pl ? pl.songIds.map(id=>songs.find(s=>s.id===id)).filter(Boolean) : [];
        }
        if (currentView==='movie' && currentMovie) {
            return songs.filter(s=>s.movie && s.movie.trim() === currentMovie);
        }
        return [...songs];
    }

    // ========== UI RENDERING ==========
    const contentArea = document.getElementById('contentArea');
    const viewTitle = document.getElementById('viewTitle');
    const searchInput = document.getElementById('searchInput');
    const queueBadge = document.getElementById('queueBadge');
    const npTitle = document.getElementById('npTitle');
    const npArtist = document.getElementById('npArtist');
    const npArt = document.getElementById('npArt');
    const btnPlay = document.getElementById('btnPlay');

    function stringToColor(str) {
        const colors = ['#ff6b6b','#48dbfb','#ffd93d','#6c5ce7','#a29bfe'];
        let hash=0; for(let i=0;i<str.length;i++) hash = str.charCodeAt(i)+((hash<<5)-hash);
        return colors[Math.abs(hash)%colors.length];
    }

    function render() {
        if (currentView === 'movies') {
            const movies = [...new Set(songs.map(s=>s.movie).filter(m=>m))].sort();
            const q = searchInput.value.toLowerCase().trim();
            const filtered = q ? movies.filter(m => m.toLowerCase().includes(q)) : movies;
            viewTitle.textContent = '🎬 Movies';
            contentArea.innerHTML = filtered.length ? `
                <div class="movie-grid">
                    ${filtered.map(movie => {
                        const count = songs.filter(s=>s.movie===movie).length;
                        return `<div class="movie-card" data-movie="${esc(movie)}">
                            <div class="movie-icon">🎬</div>
                            <div class="movie-name">${esc(movie)}</div>
                            <div class="movie-count">${count} song${count!==1?'s':''}</div>
                        </div>`;
                    }).join('')}
                </div>
            ` : '<div style="text-align:center;padding:40px;color:var(--text-muted);">No movies</div>';
            renderPlaylists();
            updateNowPlaying();
            return;
        }

        let list = getContextSongs();
        if (currentView==='queue') list = queue.map(id=>songs.find(s=>s.id===id)).filter(Boolean);
        const q = searchInput.value.toLowerCase();
        if (q) list = list.filter(s=> s.name.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q) || (s.movie||'').toLowerCase().includes(q));

        if (currentView==='queue') viewTitle.textContent = '⏳ Queue';
        else if (currentView==='playlist' && currentPlaylistId) {
            const pl = playlists.find(p=>p.id===currentPlaylistId);
            viewTitle.textContent = pl ? '🎧 '+pl.name : 'Playlist';
        } else if (currentView==='movie' && currentMovie) viewTitle.textContent = '🎬 '+currentMovie;
        else viewTitle.textContent = '📚 Library';

        contentArea.innerHTML = list.length ? list.map((s,i) => {
            const playing = currentSongId===s.id && isPlaying;
            const inQueue = queue.includes(s.id);
            return `<div class="song-row ${playing?'playing':''}" data-id="${s.id}">
                <div class="song-index">${i+1}</div>
                <div class="album-art" style="background:${stringToColor(s.name)};">${s.name[0]}</div>
                <div class="song-info">
                    <div class="song-title">${esc(s.name)}</div>
                    <div class="song-artist">${esc(s.artist)} ${s.movie ? '· '+esc(s.movie) : ''}</div>
                </div>
                <div class="song-actions">
                    <button data-action="play">▶️</button>
                    <button data-action="queue">${inQueue?'✅':'➕'}</button>
                    ${isAdmin ? '<button data-action="delete">🗑️</button>' : ''}
                    ${currentView==='queue' ? '<button data-action="removeQueue">❌</button>' : ''}
                    ${(currentView==='playlist' && currentPlaylistId && isAdmin) ? '<button data-action="removeFromPlaylist">➖</button>' : ''}
                    ${isAdmin ? '<button data-action="addToPlaylist">📋</button>' : ''}
                </div>
            </div>`;
        }).join('') : '<div style="text-align:center;padding:40px;color:var(--text-muted);">No songs</div>';

        queueBadge.textContent = queue.length || '';
        renderPlaylists();
        updateNowPlaying();
    }

    function updateNowPlaying() {
        btnPlay.textContent = isPlaying ? '⏸️' : '▶️';
        const song = songs.find(s=>s.id===currentSongId);
        npTitle.textContent = song ? song.name : 'No song';
        npArtist.textContent = song ? (song.artist + (song.movie ? ' · '+song.movie : '')) : '';
        npArt.style.background = song ? stringToColor(song.name) : 'var(--accent)';
        npArt.textContent = song ? song.name[0] : '🎶';
        document.getElementById('volumeSlider').value = audio.volume;
    }

    function esc(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

    const playlistContainer = document.getElementById('playlistContainer');
    function renderPlaylists() {
        playlistContainer.innerHTML = playlists.map(pl => `
            <div class="playlist-item${currentView==='playlist' && currentPlaylistId===pl.id ? ' active-playlist' : ''}"
                 data-playlist-id="${pl.id}">
                📁 ${esc(pl.name)}
                <span style="margin-left:auto; font-size:0.7rem; margin-right:8px;">${pl.songIds.length}</span>
                <button class="delete-playlist-btn" data-pid="${pl.id}" style="background:none;border:none;color:white;font-size:1rem;cursor:pointer;">🗑️</button>
            </div>
        `).join('');
    }

    playlistContainer.addEventListener('click', async (e) => {
        const delBtn = e.target.closest('.delete-playlist-btn');
        if (delBtn) {
            e.stopPropagation();
            const pid = delBtn.dataset.pid;
            if (confirm('Delete this playlist?')) {
                await fetchAPI('deletePlaylist', { id: pid });
                playlists = playlists.filter(p => p.id !== pid);
                if (currentView==='playlist' && currentPlaylistId===pid) {
                    currentView = 'library';
                    currentPlaylistId = null;
                }
                updateUI();
                showToast('Playlist deleted');
            }
            return;
        }
        const plEl = e.target.closest('.playlist-item');
        if (plEl) {
            currentView = 'playlist';
            currentPlaylistId = plEl.dataset.playlistId;
            currentMovie = null;
            searchInput.value = '';
            updateUI();
        }
    });

    contentArea.addEventListener('click', async (e) => {
        const movieCard = e.target.closest('.movie-card');
        if (movieCard) {
            currentView = 'movie';
            currentMovie = movieCard.dataset.movie;
            currentPlaylistId = null;
            searchInput.value = '';
            updateUI();
            return;
        }
        const btn = e.target.closest('button');
        const row = e.target.closest('.song-row');
        if (!btn && row) { playSong(row.dataset.id); return; }
        if (!btn) return;
        const songId = row?.dataset.id;
        const action = btn.dataset.action;

        if (action==='play') playSong(songId);
        else if (action==='queue') {
            if (queue.includes(songId)) queue = queue.filter(id=>id!==songId);
            else queue.push(songId);
            await fetchAPI('updateQueue', queue);
            updateUI();
        }
        else if (action==='delete' && isAdmin) {
            if (confirm('Delete this song?')) {
                await fetchAPI('deleteSong', { id: songId });
                songs = songs.filter(s=>s.id!==songId);
                queue = queue.filter(id=>id!==songId);
                playlists.forEach(p => p.songIds = p.songIds.filter(id=>id!==songId));
                if (currentSongId===songId) { audio.pause(); currentSongId=null; isPlaying=false; }
                await fetchAPI('updateQueue', queue);
                for (const pl of playlists) {
                    await fetchAPI('removeFromPlaylist', { playlistId: pl.id, songId });
                }
                updateUI();
                showToast('Song deleted');
            }
        }
        else if (action==='removeQueue') {
            queue = queue.filter(id=>id!==songId);
            await fetchAPI('updateQueue', queue);
            updateUI();
        }
        else if (action==='removeFromPlaylist' && currentPlaylistId && isAdmin) {
            await fetchAPI('removeFromPlaylist', { playlistId: currentPlaylistId, songId });
            const pl = playlists.find(p=>p.id===currentPlaylistId);
            if (pl) pl.songIds = pl.songIds.filter(id=>id!==songId);
            updateUI();
        }
        else if (action==='addToPlaylist' && isAdmin) {
            pendingSongId = songId;
            showPlaylistPicker();
        }
    });

    let pendingSongId = null;
    function showPlaylistPicker() {
        const plList = playlists.map(p => `<div style="padding:8px;cursor:pointer;color:white;" data-pid="${p.id}">📁 ${esc(p.name)}</div>`).join('');
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:200;';
        modal.innerHTML = `<div style="background:rgba(20,20,40,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;min-width:250px;color:white;">
            <h3>Add to Playlist</h3>
            ${plList || '<p>No playlists yet</p>'}
            <button style="margin-top:10px;">Cancel</button>
        </div>`;
        document.body.appendChild(modal);
        modal.querySelector('button').onclick = () => modal.remove();
        modal.querySelectorAll('[data-pid]').forEach(el => el.onclick = async () => {
            const pid = el.dataset.pid;
            await fetchAPI('addToPlaylist', { playlistId: pid, songId: pendingSongId });
            const pl = playlists.find(p=>p.id===pid);
            if (pl && !pl.songIds.includes(pendingSongId)) pl.songIds.push(pendingSongId);
            updateUI();
            showToast('Added to playlist');
            modal.remove();
        });
        modal.addEventListener('click', (e) => { if(e.target===modal) modal.remove(); });
    }

    // Sidebar nav
    document.querySelectorAll('.nav-item').forEach(el => el.addEventListener('click', function() {
        currentView = this.dataset.view;
        currentPlaylistId = null;
        currentMovie = null;
        searchInput.value = '';
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        this.classList.add('active');
        updateUI();
    }));

    document.getElementById('btnNewPlaylist').addEventListener('click', async () => {
        const name = prompt('Playlist name:');
        if (name) {
            const newId = 'pl'+Date.now();
            await fetchAPI('addPlaylist', { id: newId, name, songIds: [] });
            playlists.push({ id: newId, name, songIds: [] });
            updateUI();
            showToast('Playlist created');
        }
    });

    // Player controls
    document.getElementById('btnPlay').addEventListener('click', togglePlay);
    document.getElementById('btnNext').addEventListener('click', nextTrack);
    document.getElementById('btnPrev').addEventListener('click', () => {
        const ctx = getContextSongs();
        const idx = ctx.findIndex(s=>s.id===currentSongId);
        if (idx>0) playSong(ctx[idx-1].id);
    });
    document.getElementById('btnShuffle').addEventListener('click', () => { shuffle=!shuffle; });
    document.getElementById('btnRepeat').addEventListener('click', () => {
        repeat = repeat==='none'?'all': repeat==='all'?'one':'none';
    });
    document.getElementById('volumeSlider').addEventListener('input', e => audio.volume = e.target.value);

    // Add song sheet
    const addSongSheet = document.getElementById('addSongSheet');
    const openSheet = () => { if(isAdmin) addSongSheet.classList.add('active'); };
    const closeSheet = () => {
        addSongSheet.classList.remove('active');
        document.getElementById('inpName').value='';
        document.getElementById('inpArtist').value='';
        document.getElementById('inpMovie').value='';
        document.getElementById('inpUrl').value='';
    };
    document.getElementById('fabAdd').addEventListener('click', openSheet);
    document.getElementById('desktopAddBtn').addEventListener('click', openSheet);
    document.getElementById('cancelSheetBtn').addEventListener('click', closeSheet);
    document.getElementById('saveSongBtn').addEventListener('click', async () => {
        const name = document.getElementById('inpName').value.trim();
        const artist = document.getElementById('inpArtist').value.trim();
        const movie = document.getElementById('inpMovie').value.trim();
        const url = document.getElementById('inpUrl').value.trim();
        if (!name || !artist || !url) return showToast('Fill required fields');
        const newSong = { id: 's'+Date.now(), name, artist, movie, url };
        await fetchAPI('addSong', newSong);
        songs.push(newSong);
        updateUI();
        closeSheet();
        showToast('Song added!');
    });
    addSongSheet.addEventListener('click', e => { if(e.target===addSongSheet) closeSheet(); });

    document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    function showToast(msg) {
        const t = document.createElement('div');
        t.className='toast';
        t.textContent=msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 2000);
    }

    function updateUI() {
        updateNowPlaying();
        render();
    }
})();
</script>
</body>
</html>
